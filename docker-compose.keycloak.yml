# Local Keycloak for the react-storybook-demo app (development only).
# See docs/docker-keycloak-local.md for concepts and first-time setup.
#
# Start:
#   docker compose --env-file .env.keycloak -f docker-compose.keycloak.yml up -d
# Logs:
#   docker compose -f docker-compose.keycloak.yml logs -f keycloak
# Stop:
#   docker compose -f docker-compose.keycloak.yml down

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.8
    container_name: react-storybook-keycloak
    command: start-dev
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
